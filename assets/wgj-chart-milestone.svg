<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">We Go Jim App Store chart milestone</title>
  <desc id="desc">A graphic celebrating We Go Jim reaching number 9 on the App Store Health and Fitness Paid Apps chart.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101f2c"/>
      <stop offset="0.48" stop-color="#172e40"/>
      <stop offset="1" stop-color="#071018"/>
    </linearGradient>
    <radialGradient id="glowA" cx="24%" cy="30%" r="54%">
      <stop offset="0" stop-color="#7ce3ef" stop-opacity="0.55"/>
      <stop offset="0.42" stop-color="#1e86ff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#1e86ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="78%" cy="72%" r="55%">
      <stop offset="0" stop-color="#62d8a6" stop-opacity="0.38"/>
      <stop offset="0.52" stop-color="#62d8a6" stop-opacity="0.11"/>
      <stop offset="1" stop-color="#62d8a6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rank" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7ce3ef"/>
      <stop offset="0.54" stop-color="#6db5ff"/>
      <stop offset="1" stop-color="#62d8a6"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="30" stdDeviation="28" flood-color="#000000" flood-opacity="0.36"/>
    </filter>
  </defs>

  <rect width="1200" height="720" rx="42" fill="url(#bg)"/>
  <rect width="1200" height="720" rx="42" fill="url(#glowA)"/>
  <rect width="1200" height="720" rx="42" fill="url(#glowB)"/>
  <path d="M88 92H1112" stroke="#ffffff" stroke-opacity="0.08"/>
  <path d="M88 628H1112" stroke="#ffffff" stroke-opacity="0.08"/>

  <g filter="url(#softShadow)">
    <rect x="92" y="106" width="1016" height="508" rx="36" fill="#0b1620" fill-opacity="0.72" stroke="#7ce3ef" stroke-opacity="0.20"/>
    <rect x="116" y="130" width="968" height="460" rx="28" fill="#ffffff" fill-opacity="0.045"/>
  </g>

  <g transform="translate(152 166)">
    <rect x="0" y="0" width="188" height="188" rx="42" fill="#0e1b27" stroke="#7ce3ef" stroke-opacity="0.28"/>
    <rect x="18" y="18" width="152" height="152" rx="34" fill="url(#rank)"/>
    <circle cx="94" cy="83" r="42" fill="#071018" fill-opacity="0.22"/>
    <path d="M55 106c20 28 58 28 78 0" fill="none" stroke="#071018" stroke-opacity="0.42" stroke-width="12" stroke-linecap="round"/>
    <text x="94" y="118" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="40" font-weight="950" fill="#071018" letter-spacing="-2">WGJ</text>
  </g>

  <g transform="translate(396 156)">
    <rect x="0" y="0" width="214" height="68" rx="34" fill="#7ce3ef" fill-opacity="0.12" stroke="#7ce3ef" stroke-opacity="0.32"/>
    <text x="107" y="43" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="800" fill="#aef7ff" letter-spacing="2">MILESTONE</text>

    <text x="0" y="182" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="112" font-weight="900" fill="#ffffff" letter-spacing="-4">Top 10</text>
    <text x="0" y="248" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="40" font-weight="800" fill="#e8f7ff">Health &amp; Fitness Paid Apps</text>
    <text x="0" y="302" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="650" fill="#a8b8c8">We Go Jim reached #9 on the App Store chart.</text>
  </g>

  <g transform="translate(826 150)">
    <circle cx="126" cy="126" r="126" fill="url(#rank)"/>
    <circle cx="126" cy="126" r="108" fill="#071018" fill-opacity="0.26" stroke="#ffffff" stroke-opacity="0.28"/>
    <text x="126" y="104" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="900" fill="#071018" opacity="0.74">#</text>
    <text x="126" y="183" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="112" font-weight="950" fill="#071018" letter-spacing="-6">9</text>
  </g>

  <g transform="translate(152 488)">
    <rect x="0" y="0" width="896" height="66" rx="18" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.10"/>
    <text x="28" y="42" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="750" fill="#ffffff">Fast workout logging. Reusable templates. Private training circles.</text>
  </g>
</svg>
